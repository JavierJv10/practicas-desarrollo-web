<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario con Validación</title>
    <style>
        .error {
            color: red;
            font-size: 12px;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <h2>Formulario de Registro</h2>
    <form id="registrationForm">
        <div>
            <label for="fullName">Nombre Completo:</label>
            <input type="text" id="fullName" name="fullName">
            <span id="errorFullName" class="error"></span>
        </div>
        <div>
            <label for="email">Correo Electrónico: </label>
            <input type="email" id="email" name="email">
            <span id="errorEmail" class="error"></span>
        </div>
        <div>
            <label for="age">Edad:</label>
            <input type="number" id="age" name="age">
            <span id="errorAge" class="error"></span>
        </div>
        <div>
            <label for="phone">Número de Teléfono:</label>
            <input type="text" id="phone" name="phone">
            <span id="errorPhone" class="error"></span>
        </div>
        <div>
            <label for="gender">Género: </label>
            <select id="gender" name="gender">
                <option value="">Seleccione...</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
            </select>
            <span id="errorGender" class="error"></span>
        </div>
        <div>
            <label for="birthdate">Fecha de Nacimiento:</label>
            <input type="date" id="birthdate" name="birthdate">
            <span id="errorBirthdate" class="error"></span>
        </div>
        <div>
            <label for="comments">Comentarios:</label>
            <textarea id="comments" name="comments" maxlength="300"></textarea>
            <span id="errorComments" class="error"></span>
        </div>
        <button type="submit">Enviar</button>
        <p id="formMessage" class="success"></p>
    </form>
    <script src="form-validation.js"></script>
</body>
</html>
